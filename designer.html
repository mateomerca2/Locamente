<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseñador | L♡C∆⚡MΣИTΞ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="designer.css">
</head>
<body>

  <section class="designer-page">

    <div class="topbar">
      <a href="index.html" class="back-btn">← Volver</a>
      <h1>Diseña Tu Prenda</h1>
      <div class="topbar-spacer"></div>
    </div>

    <div class="designer-layout">

      <!-- PANEL DE CONTROLES -->
      <div class="controls-panel">

        <h2>Personalización</h2>

        <label>Tipo de prenda</label>
        <select id="productType" class="form-select">
          <option value="tshirt">Remera</option>
          <option value="hoodie">Buzo</option>
        </select>

        <label>Color</label>
        <select id="productColor" class="form-select">
          <option value="white">Blanco</option>
          <option value="gray">Gris</option>
          <option value="black">Negro</option>
        </select>

        <label>Lado</label>
        <div class="side-buttons">
          <button id="frontBtn" class="active">Frente</button>
          <button id="backBtn">Espalda</button>
        </div>

        <label>Subir diseño</label>
        <input type="file" id="uploadImage" accept="image/*" class="form-control">

        <button id="removeDesign" class="danger-btn">
          Eliminar diseño
        </button>

      </div>

      <!-- PREVIEW -->
      <div class="preview-panel">

        <div class="shirt-container">
          <img id="productImage"
               src="Imagenes/white-t-shirt-mockup-free-png.webp"
               alt="Remera">

          <canvas id="designCanvas"></canvas>
        </div>

      </div>

    </div>

  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script src="designer.js"></script>
  <script>
    console.log("Designer cargado correctamente");
  </script>
</body>
</html>
